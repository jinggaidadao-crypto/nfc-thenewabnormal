<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The New Abnormal</title>
    <style>
        /* ================= 基础视觉与变量 ================= */
        :root {
            --bg-color: #0d131a;
            --card-bg: #16222f;
            --accent-yellow: #f4ca16;
            --accent-blue: #00bcd4;
            --accent-apple: #fa243c;
            --text-main: #ffffff;
            --text-sub: #8b9bb4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 20px;
        }

        .player-container {
            width: 100%; max-width: 414px; background: var(--card-bg);
            border-radius: 24px; padding: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05); position: relative;
        }

        /* ================= 封面与歌词区域 ================= */
        .visual-area {
            position: relative; width: 100%; aspect-ratio: 1 / 1;
            margin-bottom: 24px; display: flex; justify-content: center; align-items: center;
        }

        .album-cover {
            width: 75%; aspect-ratio: 1 / 1; border-radius: 50%;
            border: 6px solid #090e14; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            object-fit: cover; animation: rotateCover 20s linear infinite;
            animation-play-state: paused; transition: opacity 0.4s, transform 0.4s;
        }

        @keyframes rotateCover { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .lyrics-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(22, 34, 47, 0.95); border-radius: 12px;
            overflow-y: auto; padding: 20px 10px 150px; text-align: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s;
            display: flex; flex-direction: column; scroll-behavior: smooth;
        }
        .lyrics-panel::-webkit-scrollbar { display: none; }
        .lyrics-panel { -ms-overflow-style: none; scrollbar-width: none; }

        .show-lyrics .lyrics-panel { opacity: 1; pointer-events: auto; }
        .show-lyrics .album-cover { opacity: 0; transform: scale(0.8); pointer-events: none; }

        .lyric-line {
            font-size: 0.95rem; color: var(--text-sub); margin-bottom: 16px;
            transition: all 0.3s ease; line-height: 1.5; cursor: pointer;
        }

        .lyric-line.active {
            color: var(--accent-yellow); font-size: 1.1rem; font-weight: bold;
            text-shadow: 0 0 10px rgba(244, 202, 22, 0.3); transform: scale(1.05);
        }

        .lyrics-status { color: var(--text-sub); font-size: 0.9rem; margin: auto; }

        /* ================= 歌曲信息与进度条 ================= */
        .song-details { text-align: center; margin-bottom: 20px; }
        .song-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
        .artist-name { font-size: 0.95rem; color: var(--accent-blue); font-weight: 500; }

        .progress-container { margin-bottom: 20px; }
        
  /* ================= 进度条自适应完美对齐方案 ================= */
        .progress-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 26px; /* 🌟 保持超大的上下触摸热区，在手机上极易点中 */
            background-color: transparent; /* 容器本身完全透明 */
            background-repeat: no-repeat;
            
            /* 🌟 核心魔法：强行把进度线条的视觉高度约束在 6px，绝对不许发胖 */
            background-size: 100% 6px; 
            
            /* 🌟 核心魔法：将 6px 的线条在 26px 的大热区里垂直完美居中 */
            background-position: center; 
            
            outline: none;
            cursor: pointer;
        }

        /* 针对 iPhone (Safari/WebKit) 的小圆点样式微调 */
        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--text-main);
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            transition: transform 0.1s;
            
            /* 🌟 核心魔法：在 WebKit 中，当不特意魔改轨道时，圆点会自动在 input 的总高度(32px)里绝对居中，从而与同样居中的 6px 线条形成完美贴合，绝不脱节 */
        }

        .progress-slider::-webkit-slider-thumb:active {
            transform: scale(1.3); /* 按住时圆点优雅放大 */
        }

        .time-info {
            display: flex; justify-content: space-between; font-size: 0.75rem;
            color: var(--text-sub); margin-top: 2px; /* 微调间距以配合透明边框 */
        }

        /* ================= 控制栏 ================= */
        .controls-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .side-controls { display: flex; gap: 14px; align-items: center; width: 80px; }
        .side-controls.right { justify-content: flex-end; gap: 6px; }
        .main-controls { display: flex; align-items: center; gap: 20px; }

        .btn {
            background: none; border: none; cursor: pointer; color: var(--text-main);
            fill: currentColor; display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, color 0.2s;
        }
        .btn:active { transform: scale(0.9); }

        .btn svg {
            width: 100%;
            height: 100%;
        }

        .btn-side { color: var(--text-sub); width: 24px; height: 24px; }
        .btn-side:hover, .btn-side.active { color: var(--accent-blue); }
        .btn-prev, .btn-next { color: var(--text-sub); width: 28px; height: 28px; }
        .btn-play {
            width: 56px; height: 56px; background: var(--accent-yellow); border-radius: 50%;
            color: #000; box-shadow: 0 6px 15px rgba(244,202,22,0.3);
        }

        /* ================= 跳转平台图标 ================= */
        .mini-platform {
            width: 26px; height: 26px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; background: rgba(255,255,255,0.05);
            text-decoration: none; transition: transform 0.2s; overflow: hidden;
        }
        .mini-platform:active { transform: scale(0.9); }
        .mini-platform img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .mini-platform.apple { background-color: rgba(250, 36, 60, 0.1); }
        .mini-platform.qq { background-color: rgba(49, 194, 124, 0.1); }
        .mini-platform.netease { background-color: rgba(230, 0, 38, 0.1); }
        .mini-platform.spotify { background-color: rgba(30, 215, 96, 0.1); }
        .mini-platform.bilibili { background-color: rgba(0, 174, 236, 0.1); }

        /* ================= 歌单列表 ================= */
        .playlist-header {
            font-size: 0.9rem; color: var(--text-sub); margin-bottom: 10px;
            display: flex; justify-content: space-between;
        }
        .track-list { list-style: none; max-height: 200px; overflow-y: auto; padding-right: 4px; }
        .track-list::-webkit-scrollbar { width: 4px; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .track-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 8px; border-radius: 8px; cursor: pointer; margin-bottom: 4px;
            transition: background 0.2s;
        }
        .track-item:hover { background: rgba(255,255,255,0.03); }
        .track-item.active { background: rgba(0, 188, 212, 0.15); }
        .track-item.active .track-name { color: var(--accent-blue); font-weight: 600; }
        .track-name { font-size: 0.9rem; }
        .track-time { font-size: 0.8rem; color: var(--text-sub); }

        .toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(230, 0, 38, 0.9); color: white; padding: 8px 16px;
            border-radius: 20px; font-size: 0.85rem; opacity: 0; pointer-events: none;
            transition: opacity 0.3s; z-index: 10;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="player-container" id="playerApp">
    <div class="toast" id="toastBox">提示信息</div>

    <div class="visual-area">
        <img src="cover.jpg" alt="Album Cover" class="album-cover" id="albumCover">
        <div class="lyrics-panel" id="lyricsPanel">
            <div class="lyrics-status" id="lyricsStatus">正在初始化播放器...</div>
            <div id="lyricsContent"></div>
        </div>
    </div>

    <div class="song-details">
        <div class="song-title" id="currentTitle">Loading...</div>
        <div class="artist-name" id="currentArtist">Loading...</div>
    </div>

    <div class="progress-container">
        <input type="range" class="progress-slider" id="progressSlider" min="0" max="100" value="0">
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <div class="controls-bar">
        <div class="side-controls">
            <button class="btn btn-side" id="btnLoop" title="循环模式">
                <svg viewBox="0 0 24 24" id="loopIcon"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
            <button class="btn btn-side" id="btnLyrics" title="查看歌词">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </button>
        </div>

        <div class="main-controls">
            <button class="btn btn-prev" id="btnPrev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="btn btn-play" id="btnPlay"><svg viewBox="0 0 24 24" id="playIcon" style="width:28px;height:28px;"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="btn btn-next" id="btnNext"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg></button>
        </div>

        <div class="side-controls right">
            <a href="#" class="mini-platform apple" id="linkApple" target="_blank" style="display: none;" title="Apple Music"><img src="icon-apple.svg" alt="Apple Music"></a>
            <a href="#" class="mini-platform qq" id="linkQQ" target="_blank" style="display: none;" title="QQ音乐"><img src="icon-qqmusic.svg" alt="QQ Music"></a>
            <a href="#" class="mini-platform netease" id="linkNetease" target="_blank" style="display: none;" title="网易云音乐"><img src="icon-neteasemusic.svg" alt="NetEase Music"></a>
            <a href="#" class="mini-platform spotify" id="linkSpotify" target="_blank" style="display: none;" title="Spotify"><img src="icon-spotify.svg" alt="Spotify"></a>
            <a href="#" class="mini-platform bilibili" id="linkBilibili" target="_blank" style="display: none;" title="Bilibili"><img src="icon-bilibili.svg" alt="Bilibili"></a>
        </div>
    </div>

    <div class="playlist-header"><span>Tracklist</span><span style="font-size: 0.75rem;">点击播放</span></div>
    <ul class="track-list" id="trackList"></ul>
</div>

<audio id="mainAudio" src="" preload="metadata"></audio>

<script>
    // [安全] XSS 过滤器
    function escapeHTML(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, function(match) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[match];
        });
    }

    // [安全] URL 协议黑名单过滤器 (防注入同时兼容 APP URL Schemes)
    function isSafeUrl(url) {
        const invalidProtocols = /^(javascript|vbscript|data):/i;
        return !invalidProtocols.test(url.trim());
    }

    // [网络优化] 带有超时控制的 fetch (Kimi建议9)
    const fetchWithTimeout = async (resource, options = {}) => {
        const { timeout = 5000 } = options;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(resource, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
        } catch (error) {
            clearTimeout(id);
            throw error;
        }
    };

    // ==========================================
    // ⚙️ 核心播放器引擎
    // ==========================================
    let playlist = []; 
    let currentTrackIndex = 0;
    let isPlaying = false;
    let loopMode = 0; 
    let isDragging = false; 
    let parsedLyrics = [];
    
    let isUserScrolling = false;
    let userScrollTimeout;
    let currentLyricsRequestId = 0;
    let lastActiveLyricIndex = -1; // [性能优化] 记录上一句歌词，降频渲染

    const audio = document.getElementById('mainAudio');
    const playerApp = document.getElementById('playerApp');
    const btnLyrics = document.getElementById('btnLyrics');
    const lyricsStatus = document.getElementById('lyricsStatus');
    const lyricsContent = document.getElementById('lyricsContent');
    const lyricsPanel = document.getElementById('lyricsPanel');
    const progressSlider = document.getElementById('progressSlider');
    const currentTimeText = document.getElementById('currentTime');
    const totalTimeText = document.getElementById('totalTime');
    const trackListContainer = document.getElementById('trackList');

    const loopIconsSVG = [
        '<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>',
        '<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/><text x="12" y="15.5" font-size="7" font-weight="bold" text-anchor="middle" fill="currentColor">1</text>',
        '<path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>'
    ];

    async function loadPlaylistConfig() {
        try {
            const response = await fetchWithTimeout('playlist.json', { timeout: 6000 });
            if (!response.ok) throw new Error('Network error');
            playlist = await response.json();
            if (!playlist || playlist.length === 0) {
                lyricsStatus.textContent = '歌单配置文件为空';
                return;
            }
            initPlaylist();
            loadTrack(0);
        } catch (error) {
            showToast("未能加载歌单，请检查网络或 json 格式");
            lyricsStatus.textContent = '配置文件读取失败，请检查根目录下的 playlist.json';
        }
    }

    const handleUserScroll = () => {
        isUserScrolling = true;
        clearTimeout(userScrollTimeout);
        userScrollTimeout = setTimeout(() => isUserScrolling = false, 3000);
    };
    lyricsPanel.addEventListener('touchstart', handleUserScroll, {passive: true});
    lyricsPanel.addEventListener('wheel', handleUserScroll, {passive: true});
    lyricsPanel.addEventListener('mousedown', handleUserScroll);

    function initPlaylist() {
        trackListContainer.innerHTML = '';
        playlist.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = `track-item ${index === currentTrackIndex ? 'active' : ''}`;
            const displayDuration = track.duration || "--:--";
            
            // [安全] 补充 XSS 转义 (Kimi建议1)
            li.innerHTML = `
                <span class="track-name">${index + 1}. ${escapeHTML(track.title)}</span>
                <span class="track-time" id="list-time-${index}">${escapeHTML(displayDuration)}</span>
            `;
            li.addEventListener('click', () => switchTrack(index));
            trackListContainer.appendChild(li);
        });
    }

    function loadTrack(index) {
        isUserScrolling = false;
        clearTimeout(userScrollTimeout);
        lastActiveLyricIndex = -1; // 重置歌词防抖缓存

        currentTrackIndex = index;
        const track = playlist[index];
        audio.src = track.src;
        document.getElementById('currentTitle').textContent = track.title;
        document.getElementById('currentArtist').textContent = track.artist;
        document.title = `${track.title} - ${track.artist}`;
        
        let tempMax = 300;
        if (track.duration && track.duration.includes(':')) {
            const timeParts = track.duration.split(':');
            tempMax = parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]);
        }
        progressSlider.max = tempMax; 
        
        totalTimeText.textContent = track.duration || "--:--"; 
        progressSlider.value = 0;
        progressSlider.style.background = 'rgba(255,255,255,0.1)';
        currentTimeText.textContent = '0:00';

        setupPlatform('linkApple', track.apple);
        setupPlatform('linkQQ', track.qq);
        setupPlatform('linkNetease', track.netease);
        setupPlatform('linkSpotify', track.spotify);
        setupPlatform('linkBilibili', track.bilibili);

        const items = trackListContainer.querySelectorAll('.track-item');
        items.forEach((item, idx) => item.classList.toggle('active', idx === index));

        fetchLyrics(track);
    }

    function setupPlatform(id, url) {
        const el = document.getElementById(id);
        // [安全] 在防黑名单的基础上允许应用深层链接 (优化版 Kimi 建议 2)
        if (url && url.trim() !== "" && isSafeUrl(url)) { 
            el.href = url; 
            el.style.display = 'flex';
        } else { 
            el.href = "#"; 
            el.style.display = 'none';
        }
    }

    function switchTrack(index) {
        if (playlist.length === 0) return;
        if (index < 0) index = playlist.length - 1;
        if (index >= playlist.length) index = 0;
        loadTrack(index);
        audio.play().catch(() => {});
    }

    async function fetchLyrics(track) {
        lyricsStatus.style.display = 'block';
        lyricsStatus.textContent = '正在连接宇宙信号获取歌词...';
        lyricsContent.innerHTML = '';
        parsedLyrics = [];
        const requestId = ++currentLyricsRequestId;

        try {
            const url = `https://lrclib.net/api/get?track_name=${encodeURIComponent(track.title)}&artist_name=${encodeURIComponent(track.artist)}`;
            const response = await fetchWithTimeout(url, { timeout: 6000 });
            
            if (requestId !== currentLyricsRequestId) return; 
            if (!response.ok) throw new Error('Not Found');
            
            const data = await response.json();
            
            if (data.syncedLyrics) {
                lyricsStatus.style.display = 'none';
                parsedLyrics = parseLRC(data.syncedLyrics);
                renderLyrics();
            } else if (data.plainLyrics) {
                lyricsStatus.style.display = 'none';
                const safePlainLyrics = escapeHTML(data.plainLyrics).replace(/\n/g, '<br><br>');
                lyricsContent.innerHTML = `
                    <div style="font-size:0.8rem; color:var(--accent-yellow); margin-bottom:24px; opacity:0.8; pointer-events:none;">⚠️ 暂无时间戳，无法同步滚动与点击跳转</div>
                    <div class="lyric-line" style="color:var(--text-main); cursor:default; pointer-events:none;">${safePlainLyrics}</div>
                `;
            } else {
                lyricsStatus.textContent = '这是一首纯音乐，或暂无歌词数据';
            }
        } catch (error) {
            if (requestId === currentLyricsRequestId) {
                lyricsStatus.textContent = '无法获取歌词，可能是网络超时或跨域限制';
            }
        }
    }

    function parseLRC(lrc) {
        const lines = [];
        const regex = /\[(\d{2}):(\d{2}(?:\.\d{2,3})?)\](.*)/g;
        let match;
        while ((match = regex.exec(lrc)) !== null) {
            const minutes = parseInt(match[1]);
            const seconds = parseFloat(match[2]);
            const text = match[3].trim();
            if (text) lines.push({ time: minutes * 60 + seconds, text: text });
        }
        return lines;
    }

    function renderLyrics() {
        lyricsContent.innerHTML = '';
        parsedLyrics.forEach((line, index) => {
            const p = document.createElement('div');
            p.className = 'lyric-line';
            p.id = `lyric-${index}`;
            p.textContent = line.text;
            p.addEventListener('click', () => {
                audio.currentTime = line.time;
                if (!isPlaying) audio.play();
                isUserScrolling = false; 
            });
            lyricsContent.appendChild(p);
        });

        if (playerApp.classList.contains('show-lyrics')) {
            syncLyrics(audio.currentTime);
        }
    }

    function syncLyrics(currentTime) {
        if (parsedLyrics.length === 0) return;

        let activeIndex = 0;
        for (let i = 0; i < parsedLyrics.length; i++) {
            if (currentTime >= parsedLyrics[i].time) activeIndex = i;
            else break;
        }

        // [性能优化] 只有当唱到新的一句时，才触发 DOM 操作和 Scroll 计算 (Kimi建议6)
        if (activeIndex !== lastActiveLyricIndex) {
            const lines = lyricsContent.getElementsByClassName('lyric-line');
            for (let i = 0; i < lines.length; i++) {
                if (i === activeIndex) {
                    if (!lines[i].classList.contains('active')) {
                        lines[i].classList.add('active');
                        if (!isUserScrolling) {
                            lines[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }
                } else {
                    lines[i].classList.remove('active');
                }
            }
            lastActiveLyricIndex = activeIndex;
        }
    }

    btnLyrics.addEventListener('click', () => {
        playerApp.classList.toggle('show-lyrics');
        btnLyrics.classList.toggle('active');
        if (playerApp.classList.contains('show-lyrics')) {
            setTimeout(() => {
                const activeLine = lyricsContent.querySelector('.lyric-line.active');
                if (activeLine) activeLine.scrollIntoView({ behavior: 'auto', block: 'center' });
            }, 100); 
        }
    });

    audio.addEventListener('loadedmetadata', () => {
        progressSlider.max = audio.duration; 
        totalTimeText.textContent = formatTime(audio.duration);
    });
    audio.addEventListener('timeupdate', () => {
        if (audio.duration && !isDragging) {
            progressSlider.value = audio.currentTime;
            currentTimeText.textContent = formatTime(audio.currentTime);
            const percent = (audio.currentTime / audio.duration) * 100;
            // 💡 核心修复：仅修改 backgroundImage，绝不干扰 background-clip 裁剪模式
            progressSlider.style.backgroundImage = `linear-gradient(to right, var(--accent-blue) ${percent}%, rgba(255,255,255,0.1) ${percent}%)`;
            syncLyrics(audio.currentTime);
        }
    });

    // [UX 体验优化] 弱网加载缓冲提示 (Kimi建议7)
    audio.addEventListener('waiting', () => {
        currentTimeText.textContent = "缓冲...";
    });
    audio.addEventListener('playing', () => {
        currentTimeText.textContent = formatTime(audio.currentTime);
    });

    progressSlider.addEventListener('input', () => {
        isDragging = true;
        currentTimeText.textContent = formatTime(progressSlider.value);
        const percent = (progressSlider.value / audio.duration) * 100;
        progressSlider.style.backgroundImage = `linear-gradient(to right, var(--accent-blue) ${percent}%, rgba(255,255,255,0.1) ${percent}%)`;
        syncLyrics(parseFloat(progressSlider.value));
    });
    
    progressSlider.addEventListener('change', () => {
        audio.currentTime = progressSlider.value;
        isDragging = false;
    });

    document.getElementById('btnPlay').addEventListener('click', () => {
        if (playlist.length === 0) return;
        if (isPlaying) audio.pause(); else audio.play().catch(() => showToast("需要手动点击播放"));
    });

    document.getElementById('btnPrev').addEventListener('click', () => switchTrack(currentTrackIndex - 1));
    document.getElementById('btnNext').addEventListener('click', () => switchTrack(currentTrackIndex + 1));

    document.getElementById('btnLoop').addEventListener('click', () => {
        loopMode = (loopMode + 1) % 3;
        document.getElementById('loopIcon').innerHTML = loopIconsSVG[loopMode];
        showToast(["列表循环", "单曲循环", "随机播放"][loopMode]);
    });

    audio.addEventListener('ended', () => {
        if (loopMode === 1) { 
            audio.currentTime = 0; 
            audio.play(); 
        } else if (loopMode === 2) {
            let nextIdx;
            do {
                nextIdx = Math.floor(Math.random() * playlist.length);
            } while (nextIdx === currentTrackIndex && playlist.length > 1);
            switchTrack(nextIdx);
        } else {
            switchTrack(currentTrackIndex + 1);
        }
    });

    audio.addEventListener('play', () => {
        isPlaying = true;
        document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        document.getElementById('albumCover').style.animationPlayState = 'running';
    });

    audio.addEventListener('pause', () => {
        isPlaying = false;
        document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
        document.getElementById('albumCover').style.animationPlayState = 'paused';
    });

    audio.addEventListener('error', () => {
        // 💡 核心修复：如果错误代码是 1 (MEDIA_ERR_ABORTED)，说明是浏览器在省流量主动掐断，直接忽略，不弹窗误报
        if (!isPlaying) return;
        if (audio.error && audio.error.code === 1) return;

        showToast("音频加载失败，请检查文件");
        isPlaying = false;
        document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
        document.getElementById('albumCover').style.animationPlayState = 'paused';
    });

    function formatTime(seconds) {
        if (isNaN(seconds) || seconds === Infinity) return "0:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    let toastTimer;
    function showToast(msg) {
        const tb = document.getElementById('toastBox');
        tb.textContent = msg; tb.classList.add('show');
        clearTimeout(toastTimer); toastTimer = setTimeout(() => tb.classList.remove('show'), 2000);
    }

    // 启动拉取配置
    loadPlaylistConfig();
</script>
</body>
</html>
